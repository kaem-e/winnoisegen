[package]
edition = "2024"
name = "ambience"
version = "0.1.0"


[dependencies]
cpal = "0.17"
anyhow = "1.0"
rand = "0.10"
winit = { version = "0.30", features = ["rwh_06"], default-features = false }

egui = "0.33"
egui-winit = { version = "0.33", default-features = false }
egui-wgpu = { version = "0.33", features = ["winit"] }
wgpu = { version = "27.0", features = ["dx12", "metal", "parking_lot", "std", "vulkan", "wgsl"], default-features = false }
pollster = "0.4.0"
env_logger = "0.11"

