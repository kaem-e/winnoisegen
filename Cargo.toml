[package]
name    = "ambience"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow          = "1.0"
cpal            = "0.17"
egui            = "0.34"
egui-wgpu       = { version = "0.34", features = ["winit"] }
egui-winit      = { version = "0.34", default-features = false }
env_logger      = { version = "0.11" }
extfn           = "0.1"
hound = "3.5.1"
image           = { version = "0.25.10", default-features = false, features = [
	"png"
] }
log             = "0.4"
notify          = "8.2"
opus            = "0.3"
pollster        = { version = "0.4", features = ["macro"] }
qoaudio = "0.7.0"
rand            = "0.10"
ringbuf         = "0.4"
tray-icon       = "0.21"
wgpu            = { version = "29", default-features = false, features = [
	"dx12",
	"parking_lot",
	"std",
	"vulkan",
	"wgsl"
] }
window-vibrancy = "0.7"
winit           = { version = "0.30", default-features = false, features = [
	"rwh_06"
] }

[build-dependencies]
ogg = "0.9"

[profile.dev.package."*"]
opt-level = 3  # do optimized builds for deps
debug     = 2

