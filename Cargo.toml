[package]
name    = "ambience"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow          = "1.0"
cpal            = "0.17"
egui            = "0.34"
egui-wgpu       = { version = "0.34", features = ["winit"] }
egui-winit      = { version = "0.34", default-features = false }
env_logger      = { version = "0.11", default-features = false }
image           = { version = "0.25.10", default-features = false, features = [
	"png"
] }
log             = "0.4"
pollster        = { version = "0.4", features = ["macro"] }
rand            = "0.10"
tray-icon       = "0.21"
wgpu            = { version = "29", default-features = false, features = [
	"parking_lot",
	"std",
	"vulkan",
	"wgsl"
] }
window-vibrancy = "0.7"
winit           = { version = "0.30", default-features = false, features = [
	"rwh_06"
] }

